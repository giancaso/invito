<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito Speciale per Chiara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .heart-animation {
            animation: heartbeat 1s infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .confetti {
            position: fixed;
            pointer-events: none;
        }
        #btnRifiuta {
            position: relative;
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 to-purple-100 min-h-screen flex items-center justify-center p-4">
    <div id="content" class="max-w-md w-full">
        <!-- Card Invito -->
        <div class="bg-white rounded-lg shadow-2xl p-8 text-center">
            <h1 class="text-4xl font-bold text-pink-600 mb-4">✨ Chiara ✨</h1>
            
            <p class="text-gray-600 text-lg mb-6">
                Sei invitata a una serata speciale, pensata per celebrare te e il tuo compleanno.
            </p>
            
            <div class="bg-pink-50 rounded-lg p-6 mb-8 border-2 border-pink-200">
                <p class="text-gray-700 text-base leading-relaxed">
                    Una sera d’estate, tra musica, sorrisi e compagnia. Un piccolo momento fuori dal tempo, dedicato solo a te.
                </p>
            </div>

            <p class="text-gray-500 mb-8 text-sm">
                Data: <span class="font-semibold">19 giugno</span> <br>
                Luogo: <span class="font-semibold">Agordo</span>
            </p>

            <!-- Bottoni -->
            <div class="flex gap-4 justify-center">
                <button onclick="accetta()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg transition transform hover:scale-105">
                    💚 Accetto
                </button>
                <button id="btnRifiuta" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-8 rounded-lg">
                    ❌ Ripenso
                </button>
            </div>
        </div>
    </div>

    <!-- Messaggio di Risposta -->
    <div id="risposta" class="hidden fixed inset-0 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-2xl p-8 text-center max-w-md">
            <h2 id="messaggio" class="text-2xl font-bold mb-4"></h2>
            <p id="dettagli" class="text-gray-600 mb-6"></p>
            <button onclick="ricomincia()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-6 rounded-lg">
                Indietro
            </button>
        </div>
    </div>

    <script>
        const btnRifiuta = document.getElementById('btnRifiuta');

        btnRifiuta.addEventListener('mouseover', function(e) {
            const randomX = (Math.random() - 0.5) * 200;
            const randomY = (Math.random() - 0.5) * 200;
            btnRifiuta.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        function accetta() {
            document.getElementById('content').classList.add('hidden');
            document.getElementById('risposta').classList.remove('hidden');
            document.getElementById('messaggio').textContent = '💖 Perfetto!';
            document.getElementById('dettagli').textContent = 'Ti aspetto il 19 giugno. Sarà indimenticabile.';
            creaConfetti();
            salvaRisposta('accettato');
        }

        function rifiuta() {
            document.getElementById('content').classList.add('hidden');
            document.getElementById('risposta').classList.remove('hidden');
            document.getElementById('messaggio').textContent = '😢 Niente male...';
            document.getElementById('dettagli').textContent = 'Mi dispiace, ma spero di vederti presto lo stesso.';
            salvaRisposta('rifiutato');
        }

        function ricomincia() {
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('risposta').classList.add('hidden');
            btnRifiuta.style.transform = 'translate(0, 0)';
        }

        function creaConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetto = document.createElement('div');
                confetto.textContent = ['🎉', '💖', '✨', '🎊'][Math.floor(Math.random() * 4)];
                confetto.className = 'confetti text-2xl';
                confetto.style.left = Math.random() * 100 + '%';
                confetto.style.top = '-10px';
                confetto.style.animation = `fall ${2 + Math.random() * 1}s linear forwards`;
                document.body.appendChild(confetto);
                setTimeout(() => confetto.remove(), 3000);
            }
        }

        function salvaRisposta(risposta) {
            localStorage.setItem('rispostaChiara', risposta);
            console.log('Risposta salvata:', risposta);
        }

        // Aggiungi animazione CSS per i confetti
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
